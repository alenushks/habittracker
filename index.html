<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Твой трекер привычек!!</title>
</head>
<body>
    <div class="header">Твои привычки:</div>

    <div class="container" id="habitcontainer">
        
    </div>

    <div class="container add-btn-container">
        <div class="add-habit-btn">
            <button type="button" id="addbtn">Добавить привычку</button>
        </div>
    </div>

    <div class="container title-container-parent" id="titleparent">
        <div class="title-container">
            <input type="text" maxlength="100" placeholder="Введи название привычки" id="inputtitle">
            <button type="button" id="submitbtn">Готово!</button>
        </div>
    </div>

    <div class="cat-container"><img src="images/sleeping.png"></div>

    <script src="js/script.js"></script>
</body>
</html>
